version: '3.9'

services:
  # ============================================================
  # PostgreSQL Database
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: dlc_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dlc_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dlc_password}
      POSTGRES_DB: ${POSTGRES_DB:-digital_labour_chowk}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-dlc_user} -d ${POSTGRES_DB:-digital_labour_chowk}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dlc_network

  # ============================================================
  # Redis Cache
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: dlc_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-dlc_redis_password} --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - '${REDIS_PORT:-6379}:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-dlc_redis_password}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dlc_network

  # ============================================================
  # NestJS Backend API
  # ============================================================
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: ${NODE_ENV:-development}
    container_name: dlc_api
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://${POSTGRES_USER:-dlc_user}:${POSTGRES_PASSWORD:-dlc_password}@postgres:5432/${POSTGRES_DB:-digital_labour_chowk}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-dlc_redis_password}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-this-secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-this-refresh-secret}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      API_PORT: 3001
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      OTP_EXPIRY_MINUTES: ${OTP_EXPIRY_MINUTES:-10}
    volumes:
      - ./apps/api:/app
      - /app/node_modules
      - api_uploads:/app/uploads
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3001/api/v1/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - dlc_network

  # ============================================================
  # Next.js Frontend
  # ============================================================
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: ${NODE_ENV:-development}
    container_name: dlc_web
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
      NEXT_PUBLIC_APP_NAME: "Digital Labour Chowk"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    ports:
      - '3000:3000'
    depends_on:
      - api
    networks:
      - dlc_network

  # ============================================================
  # Nginx Reverse Proxy (Production)
  # ============================================================
  nginx:
    image: nginx:alpine
    container_name: dlc_nginx
    restart: unless-stopped
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
    ports:
      - '80:80'
      - '443:443'
    depends_on:
      - api
      - web
    profiles:
      - production
    networks:
      - dlc_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  api_uploads:
    driver: local

networks:
  dlc_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
