name: digital_labour_chowk
description: Digital Labour Chowk - Labour Marketplace Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Navigation
  go_router: ^14.2.7

  # Network
  dio: ^5.7.0
  retrofit: ^4.3.0
  json_annotation: ^4.9.0

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2
  hive_flutter: ^1.1.0

  # UI Components
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  pin_code_fields: ^8.0.1
  country_code_picker: ^3.0.0
  lottie: ^3.1.2

  # Utils
  intl: ^0.19.0
  logger: ^2.4.0
  connectivity_plus: ^6.0.5
  package_info_plus: ^8.1.1
  url_launcher: ^6.3.1
  image_picker: ^1.1.2
  permission_handler: ^11.3.1

  # Forms
  reactive_forms: ^17.0.1
  form_validator: ^2.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.12
  json_serializable: ^6.8.0
  retrofit_generator: ^8.2.1
  flutter_lints: ^4.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/fonts/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
